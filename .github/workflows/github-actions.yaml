name: CI/CD Pipeline - Django Notes App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t my-notes-app:latest .

      - name: Scan Image with Trivy
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            my-notes-app:latest

      - name: Push Image to Docker Hub
        run: |
          docker tag my-notes-app:latest ${{ secrets.DOCKERHUB_USERNAME }}/my-notes-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-notes-app:latest

      - name: Deploy with Docker Compose
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker compose down
          docker compose up -d